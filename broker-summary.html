};

const fmt = v => {
  const a = Math.abs(v);
  if (a >= 1e12) return (v/1e12).toFixed(1)+"T";
  if (a >= 1e9) return (v/1e9).toFixed(1)+"B";
  if (a >= 1e6) return (v/1e6).toFixed(1)+"M";
  if (a >= 1e3) return (v/1e3).toFixed(1)+"K";
  return v.toString();
};
const fmtNet = v => (v >= 0 ? "+" : "") + fmt(v);
const fmtLot = v => {
  if (v >= 1e6) return (v/1e6).toFixed(1)+"M";
  if (v >= 1e3) return (v/1e3).toFixed(1)+"K";
  return v.toString();
};

function pad2(n) {
  return String(n).padStart(2, "0");
}

function toISODate(date) {
  return `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())}`;
}

function fromISODate(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, (m || 1) - 1, d || 1);
}

function formatShortDate(iso) {
  const d = fromISODate(iso);
  return `${pad2(d.getDate())} ${MONTH_SHORT[d.getMonth()]} ${String(d.getFullYear()).slice(-2)}`;
}

function getDateRangeLabel() {
  if (!state.dateStart || !state.dateEnd) return "-";
  return `${formatShortDate(state.dateStart)} - ${formatShortDate(state.dateEnd)}`;
}

function getPresetRange(presetKey) {
  const end = new Date();
  end.setHours(0,0,0,0);

  if (presetKey === "latest") {
    return { start: toISODate(end), end: toISODate(end) };
  }

  if (presetKey === "yesterday") {
    const day = new Date(end);
    day.setDate(day.getDate() - 1);
    return { start: toISODate(day), end: toISODate(day) };
  }

  if (presetKey === "last_week") {
    const start = new Date(end);
    start.setDate(end.getDate() - 6);
    return { start: toISODate(start), end: toISODate(end) };
  }

  if (presetKey === "last_month") {
    const start = new Date(end);
    start.setDate(end.getDate() - 29);
    return { start: toISODate(start), end: toISODate(end) };
  }

  if (presetKey === "last_3_months") {
    const start = new Date(end);
    start.setDate(end.getDate() - 89);
    return { start: toISODate(start), end: toISODate(end) };
  }

  return null;
}

function setDateRangeFromPreset(presetKey) {
  const range = getPresetRange(presetKey);
  if (!range) return;
  state.datePreset = presetKey;
  state.dateStart = range.start;
  state.dateEnd = range.end;
}

function syncDateDraftFromState() {
  state.dateDraftPreset = state.datePreset;
  state.dateDraftStart = state.dateStart;
  state.dateDraftEnd = state.dateEnd;
}

  if (state.investor === "foreign") rows = rows.filter(b => BROKER_TYPE[b.code] === "asing");
  return rows;
}

function getSorted(rows) {
  const t = getActiveTab();
  return [...rows].sort((a,b) => {
    if (t === "buy") return b.bVal - a.bVal;
    if (t === "sell") return b.sVal - a.sVal;
    return Math.abs(b.net) - Math.abs(a.net);
  });
}

function getLegacyPairs(rows) {
  const buyers = [...rows].sort((a,b) => b.bVal - a.bVal);
  const sellers = [...rows].sort((a,b) => b.sVal - a.sVal);
  const count = Math.max(buyers.length, sellers.length);
  return Array.from({ length: count }, (_, i) => ({ buyer: buyers[i] || null, seller: sellers[i] || null }));
}

function getTopDrivers(rows) {
  return [...rows].sort((a,b) => Math.abs(b.net) - Math.abs(a.net)).slice(0,3);
}

function getVolumeSharePct(broker, rows) {
  const total = rows.reduce((acc, cur) => acc + cur.bVal + cur.sVal, 0);

  return (((broker.bVal + broker.sVal) / total) * 100).toFixed(1) + "%";

  const appRect = appEl ? appEl.getBoundingClientRect() : null;
  const sheetInlineStyle = appRect
    ? `left:${appRect.left + (appRect.width / 2)}px;width:${appRect.width}px;bottom:${Math.max(0, window.innerHeight - appRect.bottom)}px;`
    : "";

  const modalRoot = document.getElementById("modal-root");
  if (modalRoot) {
    modalRoot.innerHTML = state.dateSheetOpen ? `
      <div class="date-sheet-overlay open" onclick="closeDateSheet()"></div>
      <div class="date-sheet open" style="${sheetInlineStyle}" onclick="event.stopPropagation()">
        <div class="date-sheet-title">Select Date</div>
        <div class="date-sheet-pills">
          ${DATE_PRESETS.map(p => `<button class="date-sheet-pill ${state.dateDraftPreset===p.key?'active':''}" onclick="pickDatePreset('${p.key}')">${p.label}</button>`).join("")}
        </div>
        <div class="date-sheet-sep"></div>
        <div class="date-input-grid">
          <div>
            <label class="date-input-label">Start</label>
            <input class="date-input" type="date" value="${state.dateDraftStart}" max="${state.dateDraftEnd}" onchange="onDateDraftStartChange(this.value)">
          </div>
          <div>
            <label class="date-input-label">End</label>
            <input class="date-input" type="date" value="${state.dateDraftEnd}" min="${state.dateDraftStart}" onchange="onDateDraftEndChange(this.value)">
          </div>
        </div>
        <button class="date-sheet-apply" onclick="applyDateSheet()">Apply</button>
      </div>
    ` : "";
  }
}

function requestDataRefresh() {
  state.errorMessage = "";

  if (state.market === "error") {
    state.fetchStatus = "error";
    state.errorMessage = "Unable to fetch broker summary. Please check your connection and try again.";
    render();
    return;
  }

  const visible = getSorted(getFilteredBrokers());
  if (state.expandedBroker && !visible.some(b => b.code === state.expandedBroker)) {
    state.expandedBroker = null;
  }
  state.fetchStatus = "success";
  render();
}

function setInvestor(investor) {
  state.investor = investor;
  state.showAll = false;
  requestDataRefresh();
}

function setMarket(market) {
  state.market = market;
  state.showAll = false;
  requestDataRefresh();
}

function cycleMarketState() {
  const keys = MARKET_OPTIONS.map(m => m.key);
  const idx = keys.indexOf(state.market);
  const next = keys[(idx + 1) % keys.length];
  setMarket(next);
}

function openDateSheet() {
  syncDateDraftFromState();
  state.dateSheetOpen = true;
  render();
}

function closeDateSheet() {
  state.dateSheetOpen = false;
  render();
}

function pickDatePreset(presetKey) {
  const range = getPresetRange(presetKey);
  if (!range) return;
  state.dateDraftPreset = presetKey;
  state.dateDraftStart = range.start;
  state.dateDraftEnd = range.end;
  render();
}

function onDateDraftStartChange(startISO) {
  if (!startISO) return;
  state.dateDraftStart = startISO;
  if (!state.dateDraftEnd || state.dateDraftEnd < startISO) state.dateDraftEnd = startISO;
  state.dateDraftPreset = "custom";
  render();
}

function onDateDraftEndChange(endISO) {
  if (!endISO) return;
  state.dateDraftEnd = endISO;
  if (!state.dateDraftStart || state.dateDraftStart > endISO) state.dateDraftStart = endISO;
  state.dateDraftPreset = "custom";
  render();
}

function applyDateSheet() {
  if (!state.dateDraftStart || !state.dateDraftEnd) return;
  const safeStart = state.dateDraftStart <= state.dateDraftEnd ? state.dateDraftStart : state.dateDraftEnd;
  const safeEnd = state.dateDraftEnd >= state.dateDraftStart ? state.dateDraftEnd : state.dateDraftStart;
  state.dateStart = safeStart;
  state.dateEnd = safeEnd;
  state.datePreset = state.dateDraftPreset === "custom" ? "custom" : state.dateDraftPreset;
  state.dateSheetOpen = false;
  state.showAll = false;
  requestDataRefresh();
}

function toggleNet() {
  state.netOn = !state.netOn;
  if (!state.netOn && state.tab === "all") state.expandedBroker = null;
  state.showAll = false;
  requestDataRefresh();
}

function setTab(t) {
  state.tab = t;
  state.showAll = false;
  requestDataRefresh();
}

function retryFetch() {
  requestDataRefresh();
}

function toggleShowAll() {
  state.showAll = !state.showAll;
  render();
}

function toggleBrokerDetails(code) {
  state.expandedBroker = state.expandedBroker === code ? null : code;
  render();
}

function openBrokerTrades(event, code) {
  event.stopPropagation();
  window.location.href = `running-trade-mobile-light.html?broker=${encodeURIComponent(code)}`;
}

function syncDesktopFrame() {
  const app = document.getElementById("app");
  if (!app) return;
  if (window.innerWidth >= 768) {
    const scale = Math.min(1, (window.innerHeight - 48) / 860);
    app.style.transform = `scale(${scale})`;
  } else {
    app.style.transform = "";
  }
}

setDateRangeFromPreset("last_month");
syncDateDraftFromState();
requestDataRefresh();
syncDesktopFrame();
window.addEventListener("resize", syncDesktopFrame);
</script>
</body>
</html>
