<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ajaib Running Trade v8</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Ajaib palette */
    --bg-app:#F7F8FA;
    --bg-surface:#FFFFFF;
    --bg-card:#F2F3F7;
    --bg-sheet:#FFFFFF;
    --bg-row-alt:rgba(0,0,0,0.015);
    --border:#E8E9EE;
    --border-light:#F0F1F5;
    --text-primary:#1B1B1F;
    --text-secondary:#6B6E7B;
    --text-muted:#A0A3B1;
    /* Ajaib green/red from screenshot */
    --green:#2E9E5E;
    --green-dim:rgba(46,158,94,0.08);
    --green-glow:rgba(46,158,94,0.05);
    --red:#D44242;
    --red-dim:rgba(212,66,66,0.08);
    --red-glow:rgba(212,66,66,0.05);
    /* Ajaib blue accent */
    --blue:#2962FF;
    --blue-dim:rgba(41,98,255,0.08);
    --blue-border:rgba(41,98,255,0.25);
    /* Amber for highlights */
    --amber:#D4880A;
    --amber-dim:rgba(212,136,10,0.08);
    --amber-glow:rgba(212,136,10,0.05);
    --overlay:rgba(0,0,0,0.3);
    --radius:10px;
    --radius-lg:16px;
    --radius-xl:24px;
    --font-mono:'JetBrains Mono',monospace;
    --font-sans:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%}
  body{background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);width:100%;margin:0;position:relative;user-select:none}
  .page{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;overflow:hidden;background:var(--bg-surface)}
  .hidden{display:none!important}

  /* STATUS */
  .status-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 4px;font-size:12px;font-weight:600;background:var(--bg-surface)}
  .status-icons{display:flex;gap:4px;align-items:center}
  .status-icons svg{width:16px;height:16px;fill:var(--text-primary)}
  .battery{padding:1px 4px;border:1.5px solid var(--text-primary);border-radius:3px;font-size:10px;font-weight:700;position:relative}
  .battery::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:2px;height:6px;background:var(--text-primary);border-radius:0 1px 1px 0}

  /* NAV — Ajaib style: back arrow + title */
  .nav-header{display:flex;align-items:center;padding:12px 16px 10px;gap:14px;background:var(--bg-surface)}
  .nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--text-primary)}
  .nav-back svg{width:22px;height:22px}
  .nav-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
  .nav-subtitle{font-size:11px;color:var(--text-muted);margin-top:2px}

  /* CONTROL ROW */
  .control-row{display:flex;align-items:center;padding:8px 16px 10px;gap:8px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-wrap:wrap}

  /* Pause — Ajaib style rounded pill */
  .pause-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border);background:var(--bg-surface);cursor:pointer;transition:all .15s;flex-shrink:0}
  .pause-btn svg{width:16px;height:16px;color:var(--text-secondary)}
  .pause-btn:active{transform:scale(.93)}
  .pause-btn.paused{background:var(--amber-dim);border-color:var(--amber)}
  .pause-btn.paused svg{color:var(--amber)}

  /* Segmented — Ajaib pill style (like All/Domestic/Foreign) */
  .seg-ctrl{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
  .seg-btn{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-surface);color:var(--text-muted);font-family:var(--font-sans);transition:all .15s}
  .seg-btn:active{transform:scale(.96)}
  .seg-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
  .seg-btn.active-buy{border-color:var(--green);color:var(--green);background:var(--green-dim)}
  .seg-btn.active-sell{border-color:var(--red);color:var(--red);background:var(--red-dim)}

  .ctrl-spacer{flex:1 1 auto}

  .live-group{display:flex;align-items:center;gap:5px;flex-shrink:0}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:lp 1.5s infinite}
  .live-dot.paused{background:var(--amber);animation:none}
  @keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.85)}}
  .live-label{font-size:10px;color:var(--text-muted);font-weight:500}

  /* Filter button — Ajaib style */
  .filter-btn{display:flex;align-items:center;gap:4px;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-sans);transition:all .15s;flex-shrink:0}
  .filter-btn svg{width:14px;height:14px}
  .filter-btn:active{transform:scale(.96)}
  .filter-btn.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
  .filter-badge{display:none;min-width:16px;height:16px;border-radius:50%;background:var(--blue);color:white;font-size:9px;font-weight:700;align-items:center;justify-content:center;padding:0 4px}
  .filter-badge.show{display:inline-flex}

  /* Active filter chips */
  .active-filters{display:flex;gap:6px;padding:8px 16px;flex-wrap:wrap;background:var(--bg-surface);border-bottom:1px solid var(--border)}
  .af-chip{display:flex;align-items:center;gap:5px;padding:5px 8px 5px 12px;border-radius:16px;font-size:11px;font-weight:600;background:var(--blue-dim);border:1px solid var(--blue-border);color:var(--blue);font-family:var(--font-sans);cursor:pointer;transition:all .15s}
  .af-chip:active{transform:scale(.95)}
  .af-chip .af-x{width:14px;height:14px;border-radius:50%;background:rgba(41,98,255,0.12);display:flex;align-items:center;justify-content:center}
  .af-chip .af-x svg{width:8px;height:8px}

  /* TABLE — Ajaib style */
  .table-area{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg-surface)}

  .table-head.mode-general{display:grid;grid-template-columns:64px 56px minmax(118px,1fr) 48px 46px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--bg-app);column-gap:8px}
  .table-head.mode-stock{display:grid;grid-template-columns:52px 104px 36px 42px minmax(34px,1fr) minmax(34px,1fr);padding:10px 10px;border-bottom:1px solid var(--border);background:var(--bg-app);column-gap:6px}
  .th{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.01em}
  .th.right{text-align:right}.th.center{text-align:center}

  .table-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg-surface)}
  .table-scroll::-webkit-scrollbar{display:none}

  .trade-row.mode-general{display:grid;grid-template-columns:64px 56px minmax(118px,1fr) 48px 46px;padding:14px 18px;align-items:center;border-bottom:1px solid var(--border-light);position:relative;column-gap:8px}
  .trade-row.mode-stock{display:grid;grid-template-columns:52px 104px 36px 42px minmax(34px,1fr) minmax(34px,1fr);padding:12px 10px;align-items:center;border-bottom:1px solid var(--border-light);position:relative;column-gap:6px}
  .trade-row:nth-child(even){background:var(--bg-row-alt)}

  .trade-row.flash-buy{animation:fb .5s ease-out}
  .trade-row.flash-sell{animation:fs .5s ease-out}
  @keyframes fb{0%{background:var(--green-glow)}100%{background:transparent}}
  @keyframes fs{0%{background:var(--red-glow)}100%{background:transparent}}
  .trade-row.big-trade{background:var(--amber-glow)!important}
  .trade-row.big-trade .cell-lot{color:var(--amber);font-weight:700}

  /* Cell styles — Ajaib typography */
  .cell-time{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);font-weight:500;justify-self:start}
  .cell-code{font-size:12px;font-weight:700;color:var(--green);justify-self:start}
  .cell-mid{display:flex;flex-direction:column;gap:2px;min-width:0;justify-self:start;width:100%}
  .cell-price-row{display:flex;align-items:baseline;gap:5px;justify-content:flex-start;white-space:nowrap}
  .cell-price{font-family:var(--font-mono);font-size:13px;font-weight:600}
  .cell-price.up{color:var(--green)}.cell-price.down{color:var(--red)}.cell-price.flat{color:var(--text-primary)}
  .cell-change{font-family:var(--font-mono);font-size:9px;font-weight:500}
  .cell-change.up{color:var(--green)}.cell-change.down{color:var(--red)}.cell-change.flat{color:var(--text-muted)}
  .cell-broker{font-size:9px;color:var(--text-muted);font-family:var(--font-mono)}
  .cell-side{text-align:center;justify-self:center;width:100%}
  .side-label{font-family:var(--font-sans);font-size:11px;font-weight:600}
  .side-label.buy{color:var(--green)}.side-label.sell{color:var(--red)}
  .cell-lot{text-align:center;font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--text-secondary);justify-self:center;width:100%}
  .cell-brk{display:flex;flex-direction:row;align-items:baseline;gap:1px;justify-self:center;white-space:nowrap;width:100%;justify-content:center}
  .brk-code{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--text-primary)}
  .brk-type{font-family:var(--font-mono);font-size:8px;font-weight:700;letter-spacing:0.1px}
  .brk-type.D{color:var(--blue)}
  .brk-type.B{color:#7B2FBE}
  .brk-type.F{color:var(--amber)}

  /* BOTTOM */
  .home-indicator{display:flex;justify-content:center;padding:8px 0 calc(6px + var(--safe-bottom));background:var(--bg-app)}
  .home-bar{width:134px;height:5px;background:var(--text-muted);border-radius:3px;opacity:.2}

  /* FILTER SHEET — Ajaib style */
  .sheet-overlay{position:fixed;inset:0;background:var(--overlay);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
  .sheet-overlay.open{opacity:1;pointer-events:auto}
  .filter-sheet{position:fixed;left:0;right:0;bottom:0;max-width:430px;width:100%;margin:0 auto;background:var(--bg-sheet);border-radius:var(--radius-xl) var(--radius-xl) 0 0;z-index:600;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.1)}
  .filter-sheet.open{transform:translateY(0)}
  .sheet-top{flex-shrink:0;background:var(--bg-sheet);border-radius:var(--radius-xl) var(--radius-xl) 0 0;z-index:1}
  .sheet-handle{display:flex;justify-content:center;padding:12px 0 4px}
  .sheet-handle-bar{width:36px;height:4px;background:var(--border);border-radius:2px}
  .sheet-header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 14px;border-bottom:1px solid var(--border)}
  .sheet-title{font-size:18px;font-weight:700}
  .sheet-reset{font-size:13px;color:var(--blue);background:none;border:none;font-family:var(--font-sans);font-weight:600;cursor:pointer}
  .sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .sheet-scroll::-webkit-scrollbar{display:none}

  .sheet-section{padding:16px 20px;border-top:1px solid var(--border-light)}
  .sheet-section:first-child{border-top:none}
  .sheet-label{font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:12px;letter-spacing:0.2px}

  /* Source tabs — Ajaib tab style (like Ringkasan/Informasi Broker/Insider/Feed) */
  .source-tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1.5px solid var(--border)}
  .source-tab{flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);background:transparent;border:none;font-family:var(--font-sans);transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-1.5px}
  .source-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

  .source-content{min-height:50px}
  .stock-search-wrap{position:relative;margin-bottom:12px}
  .stock-search{width:100%;padding:11px 14px 11px 38px;background:var(--bg-app);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-sans);font-size:13px;font-weight:500;outline:none}
  .stock-search::placeholder{color:var(--text-muted)}.stock-search:focus{border-color:var(--blue)}
  .stock-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted)}
  .stock-options{display:flex;flex-wrap:wrap;gap:8px}
  /* Stock chips — Ajaib pill style */
  .stock-opt{padding:8px 14px;border-radius:20px;font-size:12px;font-family:var(--font-sans);font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);transition:all .15s}
  .stock-opt:active{transform:scale(.96)}
  .stock-opt.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}

  /* List items — Ajaib table row style */
  .list-item{display:flex;align-items:center;justify-content:space-between;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .15s}
  .list-item:active{transform:scale(.98)}.list-item.active{background:var(--blue-dim);border-color:var(--blue)}
  .list-item .li-name{font-size:14px;font-weight:600}.list-item.active .li-name{color:var(--blue)}
  .list-item .li-count{font-size:12px;color:var(--text-muted)}.list-item.active .li-count{color:var(--blue)}

  /* Form inputs — consistent Ajaib style */
  .sheet-input-single{width:100%;padding:11px 14px;background:var(--bg-app);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-mono);font-size:13px;outline:none;-moz-appearance:textfield}
  .sheet-input-single::-webkit-inner-spin-button,.sheet-input-single::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .sheet-input-single::placeholder{color:var(--text-muted)}.sheet-input-single:focus{border-color:var(--blue)}
  .input-hint{font-size:11px;color:var(--text-muted);margin-top:8px}
  .sheet-range{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
  .sheet-input{width:100%;padding:11px 14px;background:var(--bg-app);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-mono);font-size:13px;outline:none;min-width:0}
  .sheet-input::placeholder{color:var(--text-muted)}.sheet-input:focus{border-color:var(--blue)}
  .sheet-range-sep{color:var(--text-muted);font-size:14px;font-weight:600;text-align:center}

  /* Broker pills — Ajaib pill style */
  .broker-pills{display:flex;flex-wrap:wrap;gap:8px}
  .bp{padding:8px 14px;border-radius:20px;font-size:12px;font-family:var(--font-sans);font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);transition:all .15s}
  .bp:active{transform:scale(.96)}.bp.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}

  .sheet-footer{padding:16px 20px calc(16px + var(--safe-bottom));display:flex;gap:10px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg-sheet)}
  .sheet-btn-secondary{flex:1;padding:14px;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-sans)}
  .sheet-btn-primary{flex:2;padding:14px;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--blue);color:white;font-family:var(--font-sans)}
  .sheet-btn-primary:active{opacity:.9}
  .wf-label{position:fixed;top:50%;right:-28px;transform:rotate(-90deg) translateX(50%);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--blue);opacity:.25;text-transform:uppercase;z-index:900;pointer-events:none}

  @media (max-width: 480px){
    .nav-header{padding:12px 12px 10px}
    .control-row{padding:8px 12px 10px}
    .ctrl-spacer{display:none}
    .live-group{order:4}
    .filter-btn{margin-left:auto}
    .table-head.mode-general,.trade-row.mode-general{grid-template-columns:58px 52px minmax(104px,1fr) 42px 42px;padding-left:14px;padding-right:14px;column-gap:6px}
    .table-head.mode-stock,.trade-row.mode-stock{grid-template-columns:48px 92px 32px 38px minmax(28px,1fr) minmax(28px,1fr);padding-left:6px;padding-right:6px;column-gap:5px}
    .th{font-size:10px}
    .cell-time{font-size:10px}
    .cell-code{font-size:11px}
    .cell-price{font-size:12px}
    .cell-change{font-size:8px}
    .cell-lot{font-size:11px}
    .side-label{font-size:10px}
    .cell-lot{font-size:10px}
    .brk-code{font-size:9px}
    .brk-type{font-size:7px}
    .sheet-section{padding:14px 16px}
    .sheet-header{padding:8px 16px 14px}
    .sheet-footer{padding:14px 16px calc(14px + var(--safe-bottom));flex-direction:column}
    .sheet-btn-primary,.sheet-btn-secondary{width:100%}
    .wf-label{display:none}
  }

  @media (min-width: 768px){
    body{padding:24px 0}
    .page{min-height:calc(100vh - 48px);border-radius:24px;box-shadow:0 20px 50px rgba(15,23,42,.08)}
    .filter-sheet{max-width:430px}
  }
</style>
</head>
<body>
<div class="page">
  <div class="status-bar"><span>09:41</span><div class="status-icons"><svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg><span class="battery">87</span></div></div>

  <div class="nav-header"><button class="nav-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button><div><div class="nav-title">Running Trade</div><div class="nav-subtitle">21 Mar 2026</div></div></div>

  <div class="control-row">
    <button class="pause-btn" id="pauseBtn" onclick="togglePause()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="pauseIco"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
    </button>
    <div class="seg-ctrl">
      <button class="seg-btn active" data-side="all" onclick="setSide(this)">All</button>
      <button class="seg-btn" data-side="buy" onclick="setSide(this)">Buy</button>
      <button class="seg-btn" data-side="sell" onclick="setSide(this)">Sell</button>
    </div>
    <div class="ctrl-spacer"></div>
    <div class="live-group"><div class="live-dot" id="liveDot"></div><span class="live-label" id="liveLabel">Live</span></div>
    <button class="filter-btn" id="filterBtn" onclick="openFilter()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="16" cy="6" r="2.5"/><circle cx="8" cy="12" r="2.5"/><circle cx="14" cy="18" r="2.5"/></svg><span class="filter-badge" id="filterBadge">0</span></button>
  </div>

  <div class="active-filters hidden" id="activeFilters"></div>

  <div class="table-area">
    <div class="table-head mode-general" id="thGen"><div class="th">Time</div><div class="th">Code</div><div class="th">Price</div><div class="th center">Side</div><div class="th right">Lot</div></div>
    <div class="table-head mode-stock hidden" id="thStk"><div class="th">Time</div><div class="th">Price</div><div class="th center">Side</div><div class="th right">Lot</div><div class="th center">Buyer</div><div class="th center">Seller</div></div>
    <div class="table-scroll" id="tScroll"></div>
  </div>

  <div class="home-indicator"><div class="home-bar"></div></div>
</div>

<!-- FILTER SHEET -->
<div class="sheet-overlay" id="sheetOv" onclick="closeFilter()"></div>
<div class="filter-sheet" id="fSheet">
  <div class="sheet-top">
    <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
    <div class="sheet-header"><span class="sheet-title">Filter</span><button class="sheet-reset" onclick="resetSheet()">Reset</button></div>
  </div>
  <div class="sheet-scroll">
    <div class="sheet-section">
      <div class="sheet-label">Stock</div>
      <div class="source-tabs">
        <button class="source-tab active" onclick="switchSrc('search',this)">Search</button>
        <button class="source-tab" onclick="switchSrc('watchlist',this)">Watchlist</button>
        <button class="source-tab" onclick="switchSrc('portfolio',this)">Portfolio</button>
        <button class="source-tab" onclick="switchSrc('index',this)">Indeks</button>
      </div>
      <div class="source-content" id="srcContent"></div>
    </div>
    <div class="sheet-section"><div class="sheet-label">Minimum Lot</div><input class="sheet-input-single" placeholder="e.g. 500" id="sMinLot" type="number"><div class="input-hint">Only show trades with lot ≥ this value</div></div>
    <div class="sheet-section"><div class="sheet-label">Price Range (Rp)</div><div class="sheet-range"><input class="sheet-input" placeholder="Min" id="sPMin"><span class="sheet-range-sep">—</span><input class="sheet-input" placeholder="Max" id="sPMax"></div></div>
    <div class="sheet-section"><div class="sheet-label">Broker</div><div class="broker-pills" id="sBrokers"></div></div>
    <div class="sheet-section"><div class="sheet-label">Time Range</div><div class="sheet-range"><input class="sheet-input" placeholder="09:00" id="sTFrom"><span class="sheet-range-sep">—</span><input class="sheet-input" placeholder="16:00" id="sTTo"></div></div>
  </div>
  <div class="sheet-footer"><button class="sheet-btn-secondary" onclick="closeFilter()">Cancel</button><button class="sheet-btn-primary" onclick="applySheet()">Apply</button></div>
</div>
<div class="wf-label">RUNNING TRADE v8</div>

<script>
const STOCKS=['BBCA','BBRI','BMRI','TLKM','ASII','UNVR','HMSP','GGRM','ICBP','INDF','GOTO','BREN','PANI','CPIN','ARCI','PSAB','ITMG'];
const PR={BBCA:9575,BBRI:3480,BMRI:4730,TLKM:3050,ASII:5025,UNVR:2000,HMSP:1200,GGRM:27000,ICBP:10500,INDF:5975,GOTO:51,BREN:5800,PANI:8000,CPIN:3970,ARCI:1600,PSAB:530,ITMG:28000};
const BRK=['YP','CC','DX','KS','PD','GR','AI','MS','BK','ZP','NI','TP'];
const WL=[{name:'Blue Chips',stocks:['BBCA','BBRI','BMRI','TLKM','ASII']},{name:'Saham Gorengan',stocks:['GOTO','BREN','PANI','ARCI']},{name:'Dividen Hunters',stocks:['HMSP','GGRM','UNVR','INDF']}];
const PF=[{name:'My Portfolio',stocks:['BBCA','TLKM','GGRM','ICBP','GOTO']}];
const IX=[{name:'LQ45',count:45},{name:'IDX30',count:30},{name:'IDX80',count:80},{name:'KOMPAS100',count:100},{name:'SRI-KEHATI',count:25}];
const BIG_VAL=5e8,BIG_LOT=1000;
const BRK_TYPE={YP:'D',CC:'F',DX:'F',KS:'D',PD:'D',GR:'F',AI:'D',MS:'B',BK:'B',ZP:'F',NI:'B',TP:'D'};

let paused=false,tBuy=0,tSell=0,tCnt=0,h=9,mn=0,sc=0,activeSide='all',minLot=0;
let mode='general',selStock=null,sheetStock=null,selListName=null,sheetListName=null,selSrc='search',sheetSrc='search';

const bc=document.getElementById('sBrokers');
BRK.forEach(b=>{const btn=document.createElement('button');btn.className='bp';btn.textContent=b;btn.onclick=()=>btn.classList.toggle('active');bc.appendChild(btn)});

function getSelectedBrokers(){
  return Array.from(document.querySelectorAll('.bp.active')).map(b=>b.textContent);
}

function applyBrokerFromQuery(){
  const params=new URLSearchParams(window.location.search);
  const broker=(params.get('broker')||'').toUpperCase().trim();
  if(!broker||!BRK.includes(broker))return false;
  document.querySelectorAll('.bp').forEach(btn=>btn.classList.toggle('active',btn.textContent===broker));
  renderChips();
  updateBdg();
  return true;
}

function switchSrc(s,el){document.querySelectorAll('.source-tab').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');sheetSrc=s;renderSrc()}
function renderSrc(){
  const c=document.getElementById('srcContent');c.innerHTML='';
  if(sheetSrc==='search'){
    c.innerHTML='<div class="stock-search-wrap"><svg class="stock-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input class="stock-search" placeholder="Search stock code..." id="stkIn" oninput="fltStk()"></div><div class="stock-options" id="stkOpts"></div>';
    rStk('');
  }else if(sheetSrc==='watchlist'){WL.forEach(w=>{const el=document.createElement('div');el.className='list-item'+(sheetListName===w.name?' active':'');el.innerHTML='<span class="li-name">'+w.name+'</span><span class="li-count">'+w.stocks.length+' stocks</span>';el.onclick=()=>{sheetStock=null;sheetListName=sheetListName===w.name?null:w.name;renderSrc()};c.appendChild(el)})}
  else if(sheetSrc==='portfolio'){PF.forEach(p=>{const el=document.createElement('div');el.className='list-item'+(sheetListName===p.name?' active':'');el.innerHTML='<span class="li-name">'+p.name+'</span><span class="li-count">'+p.stocks.length+' stocks</span>';el.onclick=()=>{sheetStock=null;sheetListName=sheetListName===p.name?null:p.name;renderSrc()};c.appendChild(el)})}
  else if(sheetSrc==='index'){IX.forEach(i=>{const el=document.createElement('div');el.className='list-item'+(sheetListName===i.name?' active':'');el.innerHTML='<span class="li-name">'+i.name+'</span><span class="li-count">'+i.count+' stocks</span>';el.onclick=()=>{sheetStock=null;sheetListName=sheetListName===i.name?null:i.name;renderSrc()};c.appendChild(el)})}
}
function rStk(f){
  const c=document.getElementById('stkOpts');if(!c)return;c.innerHTML='';
  const b0=document.createElement('button');b0.className='stock-opt'+(!sheetStock&&!sheetListName?' active':'');b0.textContent='All Stocks';b0.onclick=()=>{sheetStock=null;sheetListName=null;rStk(document.getElementById('stkIn')?.value||'')};c.appendChild(b0);
  const u=(f||'').toUpperCase();
  STOCKS.forEach(s=>{if(u&&!s.includes(u))return;const b=document.createElement('button');b.className='stock-opt'+(sheetStock===s?' active':'');b.textContent=s;b.onclick=()=>{sheetStock=s;sheetListName=null;rStk(document.getElementById('stkIn')?.value||'')};c.appendChild(b)});
}
function fltStk(){rStk(document.getElementById('stkIn')?.value||'')}

function getSF(){
  if(selStock)return{type:'stock',label:selStock,stocks:[selStock]};
  if(selListName){const w=WL.find(x=>x.name===selListName);if(w)return{type:'watchlist',label:w.name,stocks:w.stocks};const p=PF.find(x=>x.name===selListName);if(p)return{type:'portfolio',label:p.name,stocks:p.stocks};const i=IX.find(x=>x.name===selListName);if(i)return{type:'index',label:i.name,stocks:null}}
  return null;
}
function renderChips(){
  const c=document.getElementById('activeFilters');c.innerHTML='';let chips=[];
  const sf=getSF();
  if(sf)chips.push({label:sf.label,action:()=>{selStock=null;selListName=null;sheetStock=null;sheetListName=null;applyMode();renderChips();updateBdg()}});
  if(minLot>0)chips.push({label:'Lot ≥ '+minLot,action:()=>{document.getElementById('sMinLot').value='';minLot=0;renderChips();updateBdg()}});
  const ab=Array.from(document.querySelectorAll('.bp.active')).map(b=>b.textContent);
  if(ab.length)chips.push({label:'Broker: '+ab.join(', '),action:()=>{document.querySelectorAll('.bp').forEach(b=>b.classList.remove('active'));renderChips();updateBdg()}});
  if(document.getElementById('sPMin').value||document.getElementById('sPMax').value)chips.push({label:'Price '+(document.getElementById('sPMin').value||'0')+'–'+(document.getElementById('sPMax').value||'∞'),action:()=>{document.getElementById('sPMin').value='';document.getElementById('sPMax').value='';renderChips();updateBdg()}});
  if(document.getElementById('sTFrom').value||document.getElementById('sTTo').value)chips.push({label:(document.getElementById('sTFrom').value||'09:00')+'–'+(document.getElementById('sTTo').value||'16:00'),action:()=>{document.getElementById('sTFrom').value='';document.getElementById('sTTo').value='';renderChips();updateBdg()}});
  if(!chips.length){c.classList.add('hidden');return}
  c.classList.remove('hidden');
  chips.forEach(ch=>{const el=document.createElement('div');el.className='af-chip';el.innerHTML=ch.label+'<div class="af-x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></div>';el.onclick=ch.action;c.appendChild(el)});
}
function updateBdg(){
  let n=0;if(selStock||selListName)n++;if(minLot>0)n++;if(document.querySelectorAll('.bp.active').length)n++;if(document.getElementById('sPMin').value||document.getElementById('sPMax').value)n++;if(document.getElementById('sTFrom').value||document.getElementById('sTTo').value)n++;
  const b=document.getElementById('filterBadge'),bt=document.getElementById('filterBtn');
  if(n>0){b.textContent=n;b.classList.add('show');bt.classList.add('active')}else{b.classList.remove('show');bt.classList.remove('active')}
}
function applyMode(){
  const sf=getSF();
  if(sf&&sf.type==='stock'){mode='stock';document.getElementById('thGen').classList.add('hidden');document.getElementById('thStk').classList.remove('hidden')}
  else{mode='general';document.getElementById('thGen').classList.remove('hidden');document.getElementById('thStk').classList.add('hidden')}
  clr();
}

function gen(){
  const sf=getSF();let code;
  if(sf&&sf.stocks&&sf.stocks.length)code=sf.stocks[Math.floor(Math.random()*sf.stocks.length)];
  else code=STOCKS[Math.floor(Math.random()*STOCKS.length)];
  const base=PR[code]||5000;const delta=Math.floor((Math.random()-.47)*base*.02);const price=base+delta;
  const action=Math.random()>.44?'buy':'sell';
  let lot;const r=Math.random();if(r<.5)lot=Math.floor(Math.random()*50)+1;else if(r<.8)lot=Math.floor(Math.random()*500)+50;else if(r<.94)lot=Math.floor(Math.random()*5000)+500;else lot=Math.floor(Math.random()*50000)+5000;
  const buyer=BRK[Math.floor(Math.random()*BRK.length)],seller=BRK[Math.floor(Math.random()*BRK.length)];
  sc+=Math.floor(Math.random()*4)+1;if(sc>=60){sc-=60;mn++}if(mn>=60){mn-=60;h++}if(h>=16){h=9;mn=0;sc=0}
  const time=`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  return{time,code,price,delta,changePct:((delta/base)*100).toFixed(2),action,lot,buyer,seller,value:price*lot*100};
}
function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function pass(t){
  if(activeSide==='buy'&&t.action!=='buy')return false;
  if(activeSide==='sell'&&t.action!=='sell')return false;
  if(minLot>0&&t.lot<minLot)return false;
  const sb=getSelectedBrokers();
  if(sb.length&&!sb.includes(t.buyer)&&!sb.includes(t.seller))return false;
  return true;
}
function isBig(t){return mode==='stock'?t.lot>=BIG_LOT:t.value>=BIG_VAL}
function addRow(t){
  if(!pass(t))return;
  const scroll=document.getElementById('tScroll'),row=document.createElement('div'),big=isBig(t);
  let cls='trade-row '+(mode==='general'?'mode-general':'mode-stock')+(t.action==='buy'?' flash-buy':' flash-sell')+(big?' big-trade':'');
  row.className=cls;
  const cs=t.delta>=0?'+':'',pd=t.delta>0?'up':t.delta<0?'down':'flat',sl=t.action==='buy'?'Buy':'Sell';
  if(mode==='general'){
    row.innerHTML='<div class="cell-time">'+t.time+'</div><div class="cell-code">'+t.code+'</div><div class="cell-mid"><div class="cell-price-row"><span class="cell-price '+pd+'">'+fmt(t.price)+'</span><span class="cell-change '+pd+'">('+cs+t.changePct+'%)</span></div></div><div class="cell-side"><span class="side-label '+t.action+'">'+sl+'</span></div><div class="cell-lot">'+fmt(t.lot)+'</div>';
  }else{
    const bt=BRK_TYPE[t.buyer]||'D',st=BRK_TYPE[t.seller]||'D';
    row.innerHTML='<div class="cell-time">'+t.time+'</div>'
      +'<div class="cell-mid"><div class="cell-price-row"><span class="cell-price '+pd+'">'+fmt(t.price)+'</span><span class="cell-change '+pd+'">('+cs+t.changePct+'%)</span></div></div>'
      +'<div class="cell-side"><span class="side-label '+t.action+'">'+sl+'</span></div>'
      +'<div class="cell-lot">'+fmt(t.lot)+'</div>'
      +'<div class="cell-brk"><span class="brk-code">'+t.buyer+'</span><span class="brk-type '+bt+'">['+bt+']</span></div>'
      +'<div class="cell-brk"><span class="brk-code">'+t.seller+'</span><span class="brk-type '+st+'">['+st+']</span></div>';
  }
  scroll.insertBefore(row,scroll.firstChild);
  while(scroll.children.length>150)scroll.removeChild(scroll.lastChild);
}
function clr(){document.getElementById('tScroll').innerHTML='';h=9;mn=0;sc=0;for(let i=0;i<25;i++)addRow(gen())}

function setSide(el){
  document.querySelectorAll('.seg-btn').forEach(c=>c.classList.remove('active','active-buy','active-sell'));
  const v=el.dataset.side;activeSide=v;
  if(v==='buy')el.classList.add('active-buy');else if(v==='sell')el.classList.add('active-sell');else el.classList.add('active');
}
function togglePause(){
  paused=!paused;const b=document.getElementById('pauseBtn'),d=document.getElementById('liveDot'),l=document.getElementById('liveLabel');
  b.classList.toggle('paused',paused);d.classList.toggle('paused',paused);l.textContent=paused?'Paused':'Live';
  if(paused){document.getElementById('pauseIco').innerHTML='<polygon points="5,3 19,12 5,21" fill="currentColor" stroke="none"/>';}
  else{document.getElementById('pauseIco').innerHTML='<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';}
}
function openFilter(){sheetStock=selStock;sheetListName=selListName;sheetSrc=selSrc||'search';document.querySelectorAll('.source-tab').forEach((t,i)=>t.classList.toggle('active',['search','watchlist','portfolio','index'][i]===sheetSrc));renderSrc();document.getElementById('sheetOv').classList.add('open');document.getElementById('fSheet').classList.add('open')}
function closeFilter(){document.getElementById('sheetOv').classList.remove('open');document.getElementById('fSheet').classList.remove('open')}
function resetSheet(){sheetStock=null;sheetListName=null;sheetSrc='search';switchSrc('search',document.querySelector('.source-tab'));document.querySelectorAll('.bp').forEach(b=>b.classList.remove('active'));['sPMin','sPMax','sTFrom','sTTo','sMinLot'].forEach(id=>document.getElementById(id).value='');selStock=null;selListName=null;selSrc='search';minLot=0;applyMode();renderChips();updateBdg()}
function applySheet(){selStock=sheetStock;selListName=sheetListName;selSrc=sheetSrc;minLot=parseInt(document.getElementById('sMinLot').value)||0;applyMode();renderChips();updateBdg();closeFilter()}

renderSrc();
const hasPresetBroker=applyBrokerFromQuery();
if(hasPresetBroker)clr();else for(let i=0;i<25;i++)addRow(gen());
setInterval(()=>{if(!paused){const b=Math.random()>.65?3:1;for(let i=0;i<b;i++)addRow(gen())}},400);
</script>
</body>
</html>
